<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CT APP</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<main class="app">

    <section class="hero">

        <div>

            <p class="eyebrow">
                Apple Block Planning
            </p>

            <h1>CT APP</h1>

            <p class="subtitle">
                Create practical mating disruption dispenser patterns for apple orchards.
            </p>

        </div>

    </section>

    <section class="card">

        <h2>Block Details</h2>

        <label>

            Block Name

            <input
                id="blockName"
                type="text"
                value="North Block">

        </label>

        <div class="grid">
                    <label>

                Acres

                <input
                    id="acres"
                    type="number"
                    value="5"
                    min="0.1"
                    step="0.1">

            </label>

            <label>

                Rows

                <input
                    id="rows"
                    type="number"
                    value="20"
                    min="1">

            </label>

           <label>

    Row Spacing, ft

    <input
        id="rowSpacing"
        type="number"
        value="12"
        min="1"
        step="0.5">

</label>

<label>

    Tree Spacing, ft

    <input
        id="treeSpacing"
        type="number"
        value="4"
        min="1"
        step="0.5">

</label>

            <label>

                Dispensers Per Acre

                <input
                    id="rate"
                    type="number"
                    value="200"
                    min="1">

            </label>

            <label>

                People Hanging

                <input
                    id="crewSize"
                    type="number"
                    value="1"
                    min="1">

            </label>

        </div>

        <button id="generateBtn">
            Generate Plans
        </button>

        </section>

</section>

<section id="resultsScreen" class="hidden">

    <section
        id="summary"
        class="card hidden">
    </section>

    <section
        id="options"
        class="options">
    </section>

    <section
        id="mapSection"
        class="card hidden">

        <h2>
            Visual Schematic
        </h2>

        <p
            id="selectedPlanText"
            class="muted">
        </p>

        <div
            id="map"
            class="map">
        </div>

    </section>

        <section
        id="instructions"
        class="card hidden">
    </section>

    <button id="backBtn" class="secondary-button">
        Back to Block Details
    </button>

</section>

</main>

<script src="app.js"></script>

</body>

</html>
